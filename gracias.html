<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias por contactarnos - PETROVIM</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            /* Light gray background */
            color: #3a3a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .thank-you-card {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 3rem 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .logo-wrapper {
            background-color: #222222;
            /* Dark background to make light logo pop */
            padding: 1.5rem;
            border-radius: 0.5rem;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .logo-wrapper img {
            height: 40px;
        }

        .success-icon {
            color: #19528f;
            /* Corporate Blue */
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .btn-primary {
            background-color: #19528f;
            border-color: #19528f;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #2b70b8;
            border-color: #2b70b8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(25, 82, 143, 0.3);
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center">
        <div class="thank-you-card">

            <div class="logo-wrapper">
                <img src="https://petrovim.com/combustibles/img/demos/industry-factory/logo-light.png"
                    alt="PETROVIM Logo">
            </div>

            <div class="success-icon">
                <i class="bi bi-check-circle-fill"></i>
            </div>

            <h1 class="fw-bold fs-2 text-dark mb-3">¡Mensaje Enviado!</h1>

            <p class="fs-5 text-secondary mb-5">Gracias por contactarnos. Nos comunicaremos a la brevedad contigo para
                atender tu solicitud.</p>

            <a href="index.html" class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-medium">
                <i class="bi bi-arrow-left me-2"></i> Volver al Inicio
            </a>

        </div>
    </div>

</body>

</html>
